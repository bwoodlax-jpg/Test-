<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OB Unbundling 2027 — Project Tracker</title>
<style>
  :root {
    --navy:  #1B2E4B;
    --teal:  #007B8A;
    --gold:  #C8973A;
    --red:   #8B0000;
    --sage:  #4A7C59;
    --purp:  #5B4A8A;
    --light: #EAF4F6;
    --mid:   #F5F5F5;
    --dark:  #1A1A1A;
    --white: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: var(--dark); }

  /* ── Header ── */
  .page-header {
    background: var(--navy);
    color: white;
    padding: 20px 32px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
  .page-header p  { font-size: 0.82rem; color: #9ECDD6; margin-top: 3px; }
  .go-live-badge {
    background: #8B0000; color: white;
    padding: 8px 18px; border-radius: 6px;
    font-size: 0.85rem; font-weight: 700; text-align: center;
    line-height: 1.4;
  }

  /* ── Summary bar ── */
  .summary-bar {
    background: var(--navy);
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 12px 32px;
    display: flex; gap: 28px; flex-wrap: wrap;
  }
  .summary-stat { text-align: center; }
  .summary-stat .num { font-size: 1.7rem; font-weight: 700; color: var(--gold); }
  .summary-stat .lbl { font-size: 0.72rem; color: #9ECDD6; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Overall progress ── */
  .overall-progress {
    background: var(--white); margin: 20px 24px 0;
    border-radius: 10px; padding: 16px 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 20px;
  }
  .overall-progress .label { font-weight: 700; font-size: 1rem; color: var(--navy); min-width: 180px; }
  .overall-progress .bar-wrap { flex: 1; background: #e0e0e0; border-radius: 8px; height: 22px; overflow: hidden; position: relative; }
  .overall-progress .bar-fill { height: 100%; background: linear-gradient(90deg, var(--teal), var(--sage)); border-radius: 8px; transition: width 0.4s ease; }
  .overall-progress .pct { font-weight: 700; font-size: 1rem; color: var(--teal); min-width: 46px; text-align: right; }

  /* ── Main layout ── */
  .main { padding: 16px 24px 32px; display: grid; grid-template-columns: 1fr; gap: 18px; }

  /* ── Phase card ── */
  .phase-card {
    background: var(--white);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    overflow: hidden;
  }
  .phase-header {
    padding: 13px 20px;
    display: flex; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none;
  }
  .phase-header:hover { filter: brightness(0.93); }
  .phase-title { color: white; font-weight: 700; font-size: 1rem; letter-spacing: 0.3px; }
  .phase-meta  { color: rgba(255,255,255,0.85); font-size: 0.78rem; margin-top: 2px; }
  .phase-progress-ring { display: flex; align-items: center; gap: 10px; }
  .ring-pct { color: white; font-size: 1.1rem; font-weight: 700; }
  .mini-bar  { width: 120px; background: rgba(255,255,255,0.25); border-radius: 4px; height: 7px; }
  .mini-fill { height: 100%; background: white; border-radius: 4px; transition: width 0.4s; }
  .chevron   { color: white; font-size: 1.1rem; margin-left: 12px; transition: transform 0.2s; }
  .collapsed .chevron { transform: rotate(-90deg); }

  /* ── Task table ── */
  .task-table { width: 100%; border-collapse: collapse; }
  .task-table th {
    background: #f0f2f5; text-align: left;
    padding: 8px 14px; font-size: 0.77rem;
    color: #555; text-transform: uppercase; letter-spacing: 0.4px;
    border-bottom: 2px solid #e0e0e0;
  }
  .task-row { border-bottom: 1px solid #eeeeee; transition: background 0.15s; }
  .task-row:hover { background: var(--light); }
  .task-row td { padding: 9px 14px; vertical-align: middle; font-size: 0.875rem; }
  .task-row.done { opacity: 0.65; }
  .task-row.done .task-name { text-decoration: line-through; color: #777; }

  /* ── Status badge ── */
  .status-badge {
    display: inline-block; padding: 3px 10px;
    border-radius: 12px; font-size: 0.72rem; font-weight: 700;
    white-space: nowrap;
  }
  .st-not-started { background: #f0f0f0; color: #777; }
  .st-in-progress  { background: #FFF3CD; color: #856404; }
  .st-complete    { background: #D4EDDA; color: #155724; }
  .st-overdue     { background: #F8D7DA; color: #721C24; }

  /* ── Owner tag ── */
  .owner-tag {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 0.72rem; font-weight: 600;
    white-space: nowrap;
  }

  /* ── Checkbox ── */
  .task-check { width: 18px; height: 18px; cursor: pointer; accent-color: var(--teal); }

  /* ── Priority dot ── */
  .priority-dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 4px; }

  /* ── Notes cell ── */
  .notes-input {
    border: 1px solid #ddd; border-radius: 4px; padding: 3px 7px;
    font-size: 0.8rem; width: 100%; color: var(--dark);
    background: transparent;
  }
  .notes-input:focus { outline: none; border-color: var(--teal); background: white; }

  /* ── Actions toolbar ── */
  .toolbar { padding: 12px 24px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 7px 16px; border-radius: 6px; border: none;
    font-size: 0.83rem; font-weight: 600; cursor: pointer;
  }
  .btn-primary { background: var(--teal); color: white; }
  .btn-primary:hover { background: #006070; }
  .btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--navy); }
  .btn-outline:hover { background: var(--light); }
  .btn-danger { background: #dc3545; color: white; }
  .btn-danger:hover { background: #b02a37; }
  .saved-msg { font-size: 0.8rem; color: var(--sage); font-weight: 600; display: none; }

  /* ── Due date coloring ── */
  .due-past { color: #721C24; font-weight: 600; }
  .due-soon { color: #856404; font-weight: 600; }
  .due-ok   { color: #555; }

  /* ── Filter bar ── */
  .filter-bar { padding: 0 24px 8px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .filter-bar label { font-size: 0.82rem; font-weight: 600; color: var(--navy); }
  .filter-bar select { padding: 5px 10px; border-radius: 6px; border: 1.5px solid #ccc; font-size: 0.82rem; }

  /* ── Print ── */
  @media print {
    .toolbar, .filter-bar { display: none; }
    .phase-card { box-shadow: none; border: 1px solid #ccc; page-break-inside: avoid; }
    body { background: white; }
  }

  /* ── Collapsed body ── */
  .phase-body.collapsed { display: none; }
</style>
</head>

// ── State ──────────────────────────────────────────────────────────────────
let state = {};

function loadState() {
  try {
    const raw = localStorage.getItem("ob_unbundling_tracker_v2");
    if (raw) state = JSON.parse(raw);
  } catch(e) { state = {}; }
}

function saveState() {
  localStorage.setItem("ob_unbundling_tracker_v2", JSON.stringify(state));
  cloudSave(state);
}

function getTask(id) {
  return state[id] || { status: "Not Started", notes: "", completed: false };
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  const container = document.getElementById("phase-container");
  const ownerFilter  = document.getElementById("filter-owner").value;
  const statusFilter = document.getElementById("filter-status").value;

  container.innerHTML = "";
  PHASES.forEach(phase => {
    const filteredTasks = phase.tasks.filter(t => {
      const ts = getTask(t.id);
      const matchOwner  = !ownerFilter  || t.owner === ownerFilter;
      const matchStatus = !statusFilter || ts.status === statusFilter;
      return matchOwner && matchStatus;
    });
    if (!ownerFilter && !statusFilter) {
      renderPhase(container, phase, phase.tasks);
    } else if (filteredTasks.length > 0) {
      renderPhase(container, phase, filteredTasks);
    }
  });
  updateSummary();
}

function renderPhase(container, phase, tasks) {
  const done  = tasks.filter(t => getTask(t.id).status === "Complete").length;
  const pct   = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
  const isCol = state[`__collapsed_${phase.id}`] || false;

  const card = document.createElement("div");
  card.className = "phase-card";
  card.innerHTML = `
    <div class="phase-header ${isCol ? 'collapsed' : ''}"
         style="background:${phase.color}"
         onclick="togglePhase('${phase.id}', this)">
      <div>
        <div class="phase-title">${phase.label}</div>
        <div class="phase-meta">Due: ${phase.due} &nbsp;•&nbsp; ${done}/${tasks.length} tasks complete</div>
      </div>
      <div class="phase-progress-ring">
        <div class="ring-pct">${pct}%</div>
        <div class="mini-bar"><div class="mini-fill" style="width:${pct}%"></div></div>
        <span class="chevron">▼</span>
      </div>
    </div>
    <div class="phase-body${isCol ? ' collapsed' : ''}">
      <table class="task-table">
        <thead><tr>
          <th style="width:32px">✓</th>
          <th>Task</th>
          <th style="width:90px">Due Date</th>
          <th style="width:105px">Owner</th>
          <th style="width:90px">Priority</th>
          <th style="width:110px">Status</th>
          <th>Notes</th>
        </tr></thead>
        <tbody>
          ${tasks.map(t => renderTaskRow(t)).join("")}
        </tbody>
      </table>
    </div>`;
  container.appendChild(card);
}

function renderTaskRow(t) {
  const ts      = getTask(t.id);
  const isDone  = ts.status === "Complete";
  const dueStr  = formatDue(t.due, ts.status);
  const ownerClr = OWNER_COLORS[t.owner] || "#333";
  const priClr   = PRIORITY_COLORS[t.priority] || "#888";
  const stClass  = statusClass(ts.status);
  return `
    <tr class="task-row ${isDone ? 'done' : ''}" id="row_${t.id}">
      <td><input type="checkbox" class="task-check" ${isDone ? 'checked' : ''}
           onchange="toggleComplete('${t.id}', this)"/></td>
      <td class="task-name">
        <span class="priority-dot" style="background:${priClr}" title="${t.priority} Priority"></span>
        ${t.name}
      </td>
      <td class="${dueStr.cls}">${dueStr.label}</td>
      <td><span class="owner-tag" style="background:${ownerClr}22;color:${ownerClr}">${t.owner}</span></td>
      <td><span style="color:${priClr};font-weight:600;font-size:0.78rem">${t.priority}</span></td>
      <td>
        <select class="status-badge ${stClass}" onchange="updateStatus('${t.id}', this.value)">
          <option ${ts.status==="Not Started"  ? "selected" : ""}>Not Started</option>
          <option ${ts.status==="In Progress"  ? "selected" : ""}>In Progress</option>
          <option ${ts.status==="Complete"     ? "selected" : ""}>Complete</option>
          <option ${ts.status==="Overdue"      ? "selected" : ""}>Overdue</option>
        </select>
      </td>
      <td><input class="notes-input" type="text" placeholder="Add notes…"
           value="${(ts.notes||'').replace(/"/g,'&quot;')}"
           onchange="updateNotes('${t.id}', this.value)"/></td>
    </tr>`;
}

function statusClass(s) {
  if (s === "Complete")    return "st-complete";
  if (s === "In Progress") return "st-in-progress";
  if (s === "Overdue")     return "st-overdue";
  return "st-not-started";
}

function formatDue(dateStr, status) {
  const today = new Date(); today.setHours(0,0,0,0);
  const due   = new Date(dateStr + "T00:00:00");
  const diff  = Math.ceil((due - today) / 86400000);
  const label = due.toLocaleDateString("en-US", {month:"short", day:"numeric", year:"2-digit"});
  if (status === "Complete") return { label, cls: "due-ok" };
  if (diff < 0)  return { label: "⚠ " + label, cls: "due-past" };
  if (diff <= 14) return { label: "⏰ " + label, cls: "due-soon" };
  return { label, cls: "due-ok" };
}

// ── Interactions ───────────────────────────────────────────────────────────
function toggleComplete(id, el) {
  const ts = getTask(id);
  ts.status    = el.checked ? "Complete" : "Not Started";
  ts.completed = el.checked;
  state[id] = ts;
  saveState();
  render();
}

function updateStatus(id, val) {
  const ts = getTask(id);
  ts.status    = val;
  ts.completed = (val === "Complete");
  state[id] = ts;
  saveState();
  render();
}

function updateNotes(id, val) {
  const ts = getTask(id);
  ts.notes = val;
  state[id] = ts;
  saveState();
  flashSaved();
}

function togglePhase(phaseId, header) {
  const body = header.nextElementSibling;
  const isNowCollapsed = !body.classList.contains("collapsed");
  body.classList.toggle("collapsed");
  header.classList.toggle("collapsed");
  state[`__collapsed_${phaseId}`] = isNowCollapsed;
  saveState();
}

function toggleAll(expand) {
  PHASES.forEach(p => { state[`__collapsed_${p.id}`] = !expand; });
  saveState();
  render();
}

function applyFilter() { render(); }

// ── Summary ────────────────────────────────────────────────────────────────
function updateSummary() {
  let total = 0, done = 0, inprog = 0, notstart = 0, overdue = 0;
  PHASES.forEach(p => p.tasks.forEach(t => {
    const ts = getTask(t.id);
    total++;
    if (ts.status === "Complete")    done++;
    else if (ts.status === "In Progress") inprog++;
    else if (ts.status === "Overdue")     overdue++;
    else notstart++;
  }));
  const pct = total ? Math.round((done/total)*100) : 0;
  document.getElementById("total-tasks").textContent     = total;
  document.getElementById("completed-tasks").textContent = done;
  document.getElementById("inprogress-tasks").textContent= inprog;
  document.getElementById("notstarted-tasks").textContent= notstart;
  document.getElementById("overdue-tasks").textContent   = overdue;
  document.getElementById("overall-bar").style.width = pct + "%";
  document.getElementById("overall-pct").textContent = pct + "%";
}

// ── Save / Export / Reset ──────────────────────────────────────────────────
function flashSaved() {
  const msg = document.getElementById("saved-msg");
  msg.style.display = "inline";
  clearTimeout(msg._t);
  msg._t = setTimeout(() => { msg.style.display = "none"; }, 2000);
}

function saveAll() {
  saveState();
  flashSaved();
}

function confirmReset() {
  if (confirm("Reset ALL task statuses and notes? This cannot be undone.")) {
    localStorage.removeItem("ob_unbundling_tracker_v2");
    state = {};
    render();
  }
}

function exportCSV() {
  const rows = [["Phase","Task","Due Date","Owner","Priority","Status","Notes"]];
  PHASES.forEach(p => p.tasks.forEach(t => {
    const ts = getTask(t.id);
    rows.push([p.label, t.name, t.due, t.owner, t.priority, ts.status, ts.notes||""]);
  }));
  const csv = rows.map(r => r.map(c => `"${c.replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob([csv], { type:"text/csv" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "OB_Unbundling_Tracker_" + new Date().toISOString().slice(0,10) + ".csv";
  a.click();
}

// ── Auto-save on notes input (every keystroke) ────────────────────────────
document.addEventListener("input", e => {
  if (e.target.classList.contains("notes-input")) {
    updateNotes(e.target.closest("tr").id.replace("row_",""), e.target.value);
  }
}, true);

// ── Init ───────────────────────────────────────────────────────────────────
cloudLoad().then(cloud => {
  if (cloud) { state = cloud; localStorage.setItem("ob_unbundling_tracker_v2", JSON.stringify(cloud)); }
  else { loadState(); }
  render();
});

// ── Cross-browser sharing ─────────────────────────────────────────────────
function shareLink() {
  const raw = localStorage.getItem('ob_unbundling_tracker_v2') || '{}';
  try {
    const encoded = btoa(unescape(encodeURIComponent(raw)));
    const url = location.origin + location.pathname + '?s=' + encoded;
    navigator.clipboard.writeText(url).then(() => {
      alert('Share link copied!\nPaste it in Slack, email, or Teams — teammate opens it and sees your exact state.');
    }).catch(() => { prompt('Copy this link:', url); });
  } catch(e) { alert('State too large for URL — use Export JSON instead.'); }
}

function exportJSON() {
  const raw = localStorage.getItem('ob_unbundling_tracker_v2') || '{}';
  const blob = new Blob([raw], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'state_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}

function importJSON(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      JSON.parse(ev.target.result);
      localStorage.setItem('ob_unbundling_tracker_v2', ev.target.result);
      alert('Imported! Reloading...');
      location.reload();
    } catch(err) { alert('Invalid file.'); }
  };
  reader.readAsText(file);
}

(function checkURLState() {
  try {
    const s = new URLSearchParams(location.search).get('s');
    if (!s) return;
    const decoded = decodeURIComponent(escape(atob(s)));
    JSON.parse(decoded);
    if (confirm('A shared state was found in this link.\nLoad it? (Replaces your local state)')) {
      localStorage.setItem('ob_unbundling_tracker_v2', decoded);
    }
    history.replaceState({}, '', location.pathname);
    location.reload();
  } catch(e) {}
})();

// ── Firebase Cloud Sync ────────────────────────────────────────────────
const FB_URL = 'https://ob-project-bc116-default-rtdb.firebaseio.com/ob-unbundling/tracker.json';

function cloudSave(data) {
  const el = document.getElementById('cloud-status');
  if (el) { el.textContent = '☁ Saving...'; el.style.color = '#C8973A'; }
  fetch(FB_URL, {
    method: 'PUT',
    body: JSON.stringify(data),
    headers: {'Content-Type': 'application/json'}
  }).then(r => {
    if (el) { el.textContent = r.ok ? '☁ Synced' : '⚠ Sync failed'; el.style.color = r.ok ? '#4A7C59' : '#8B0000'; }
  }).catch(() => {
    if (el) { el.textContent = '⚠ Offline'; el.style.color = '#8B0000'; }
  });
}

async function cloudLoad() {
  try {
    const r = await fetch(FB_URL);
    if (r.ok) { const d = await r.json(); return d || null; }
  } catch(e) {}
  return null;
}

async function cloudRefresh() {
  const el = document.getElementById('cloud-status');
  if (el) { el.textContent = '☁ Loading...'; el.style.color = '#007B8A'; }
  const cloud = await cloudLoad();
  if (cloud) {
    localStorage.setItem('ob_unbundling_tracker_v2', JSON.stringify(cloud));
    if (el) { el.textContent = '☁ Refreshed — reloading...'; el.style.color = '#4A7C59'; }
    setTimeout(() => location.reload(), 600);
  } else {
    if (el) { el.textContent = '⚠ No cloud data'; el.style.color = '#8B0000'; }
    setTimeout(() => { if(el) el.textContent = '☁ Synced'; el.style.color='#4A7C59'; }, 2000);
  }
}
</script>
