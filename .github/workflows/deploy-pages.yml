name: Deploy RSVP to GitHub Pages

on:
  push:
    branches:
      - main
      - "claude/wedding-rsvp-form-dh2MJ"
    paths:
      - "rsvp/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./rsvp
          publish_branch: gh-pages
          enable_jekyll: false
          keep_files: true
          commit_message: "Deploy RSVP — ${{ github.sha }}"
