name: Deploy Outreach Dashboard to GitHub Pages

on:
  push:
    branches:
      - "claude/outreach-management-dashboard-3nk1ua"
    paths:
      - "outreach-dashboard/index.html"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./outreach-dashboard
          publish_branch: gh-pages
          destination_dir: outreach-dashboard
          keep_files: true
          enable_jekyll: false
          commit_message: "Deploy outreach dashboard — ${{ github.sha }}"
